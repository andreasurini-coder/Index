<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Check Turno</title>
</head>
<body>

<h2>Invio posizione...</h2>

<button id="waButton" style="display:none; font-size:20px; padding:15px;">
Apri WhatsApp
</button>

<script>

const params = new URLSearchParams(window.location.search);

let numero = params.get("n");
let tipo = params.get("t");

navigator.geolocation.getCurrentPosition(function(position) {

    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    let messaggio =
`${tipo}

Posizione:
https://maps.google.com/?q=${lat},${lon}`;

    let url = `https://wa.me/${numero}?text=${encodeURIComponent(messaggio)}`;

    let button = document.getElementById("waButton");

    button.style.display = "block";

    button.onclick = function() {
        window.location.href = url;
    };

}, function() {

    alert("Posizione non autorizzata");

});

</script>

</body>
</html>
